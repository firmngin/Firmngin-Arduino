; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html
;
; DEVELOPMENT WORKFLOW:
; 1. Edit library in src/ folder
; 2. Run: python3 sync_lib.py (to copy to examples)
; 3. Build: pio run -e esp32dev
;
; For Arduino IDE users, library is in src/ folder

[platformio]
default_envs = esp32dev
src_dir = examples/BasicExample

[common]
lib_deps =
    symlink://.
build_flags =
    -I src
    -I examples/BasicExample
    -I examples/BasicMonetizeExample
    -I examples/BatchStateExample
    -I examples/DisplayPINExample
    -I examples/EthernetExample
    -I examples/PushStateExample
    -I examples/ReceiveStateExample
    -I examples/SensorExample
    -I examples/MqttOnlyExample
    -I examples/MqttClientExample
monitor_speed = 115200
upload_speed = 576000

; ========================================
; ESP8266 - Stable version
; ========================================
[env:esp12e]
platform = espressif8266@4.2.1
board = esp12e
framework = arduino
lib_deps = ${common.lib_deps}
    rweather/Crypto @ ^0.4.0
build_flags = ${common.build_flags}
monitor_speed = ${common.monitor_speed}
upload_speed = ${common.upload_speed}
upload_port = /dev/cu.usbserial-1130
monitor_port = /dev/cu.usbserial-1130

; ========================================
; ESP32 
; ========================================
[env:esp32dev]
platform = espressif32@6.4.0
board = esp32dev
framework = arduino
lib_deps = ${common.lib_deps}
build_flags = ${common.build_flags}
monitor_speed = ${common.monitor_speed}

[env:mqttonly]
extends = env:esp32dev
src_dir = examples/MqttOnlyExample
